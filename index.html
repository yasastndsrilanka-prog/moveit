<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transport Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <i class="fas fa-truck" style="font-size: 24px; color: #2563eb;"></i>
                <h1>TransPort</h1>
            </div>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link active"><i class="fas fa-home"></i> Home</a>
                <a href="vehicles.html" class="nav-link"><i class="fas fa-truck"></i> Vehicles</a>
                <a href="map.html" class="nav-link"><i class="fas fa-map-marked-alt"></i> Live Map</a>
                <a href="reports.html" class="nav-link"><i class="fas fa-chart-bar"></i> Reports</a>
            </div>
        </nav>

        <!-- Dashboard Cards -->
        <div class="dashboard-cards">
            <a href="vehicles.html" class="card">
                <div class="card-icon"><i class="fas fa-truck"></i></div>
                <h3>Vehicle Fleet</h3>
                <p>Manage and view all vehicles</p>
            </a>
            <a href="map.html" class="card">
                <div class="card-icon"><i class="fas fa-map-marked-alt"></i></div>
                <h3>Live Tracking</h3>
                <p>Real-time vehicle locations</p>
            </a>
            <a href="reports.html" class="card">
                <div class="card-icon"><i class="fas fa-chart-line"></i></div>
                <h3>Mileage Reports</h3>
                <p>Monthly distance & verification</p>

        <!-- Quick Stats (Optional) -->
        <div style="margin-top: 40px; text-align: center; color: white;">

        </div>
