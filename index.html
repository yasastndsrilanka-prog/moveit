<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransPort | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-truck"></i>
                <h2>TransPort</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="active"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="vehicles.html"><i class="fas fa-truck"></i><span>Vehicles</span></a>
                <a href="map.html"><i class="fas fa-map-marked-alt"></i><span>Live Map</span></a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title"><i class="fas fa-home"></i> Dashboard</h1>
            </div>

            <!-- Stats Cards (Example, you can fetch real data) -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-truck"></i></div>
                    <div class="stat-info">
                        <h3>Total Vehicles</h3>
                        <p id="totalVehicles">12</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-road"></i></div>
                    <div class="stat-info">
                        <h3>Total KM (Month)</h3>
                        <p>3,245 km</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <h3>Active Vehicles</h3>
                        <p>8</p>
                    </div>
                </div>
            </div>

            <!-- Navigation Cards -->
            <div class="dashboard-cards">
                <a href="vehicles.html" class="dashboard-card">
                    <i class="fas fa-truck"></i>
                    <h3>Vehicle Fleet</h3>
                    <p>Manage and view all vehicles</p>
                </a>
                <a href="map.html" class="dashboard-card">
                    <i class="fas fa-map-marked-alt"></i>
                    <h3>Live Tracking</h3>
                    <p>Real-time vehicle locations</p>
                </a>
                <a href="reports.html" class="dashboard-card">
                    <i class="fas fa-chart-line"></i>
                    <h3>Mileage Reports</h3>
                    <p>Monthly distance & verification</p>
                </a>
            </div>
        </main>
    </div>

    <script>
        // Optional: fetch real stats from Firebase and update
    </script>
</body>
</html>
