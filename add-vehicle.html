<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-truck"></i>
                <h2>TransPort</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="vehicles.html" class="active"><i class="fas fa-truck"></i><span>Vehicles</span></a>
                <a href="map.html"><i class="fas fa-map-marked-alt"></i><span>Live Map</span></a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <a href="vehicles.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Vehicles</a>

            <div class="form-container">
                <h2 style="color: white; margin-bottom: 24px;"><i class="fas fa-plus-circle"></i> Add New Vehicle</h2>
                <form id="addVehicleForm">
                    <div class="form-group">
                        <label><i class="fas fa-id-card"></i> Plate Number *</label>
                        <input type="text" id="plateNumber" placeholder="e.g., NP-1234" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Owner Name *</label>
                        <input type="text" id="ownerName" placeholder="Full name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-info-circle"></i> Status</label>
                        <select id="status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                            <option value="maintenance">Maintenance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-odometer"></i> Initial Odometer (km)</label>
                        <input type="number" id="currentOdometer" placeholder="e.g., 12500" min="0" step="0.1">
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Vehicle</button>
                </form>
                <div id="message" style="margin-top: 16px; text-align: center; font-weight: 500;"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const form = document.getElementById('addVehicleForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const plateNumber = document.getElementById('plateNumber').value.trim();
            const ownerName = document.getElementById('ownerName').value.trim();
            const status = document.getElementById('status').value;
            const currentOdometer = parseFloat(document.getElementById('currentOdometer').value) || 0;

            if (!plateNumber || !ownerName) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            const submitBtn = form.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                await addDoc(collection(db, "vehicles"), {
                    plateNumber,
                    ownerName,
                    status,
                    currentOdometer,
                    createdAt: new Date()
                });
                showMessage('Vehicle added successfully!', 'success');
                form.reset();
            } catch (error) {
                console.error("Error adding vehicle: ", error);
                showMessage('Error adding vehicle.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Save Vehicle';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.style.color = type === 'success' ? '#4cc9f0' : '#f72585';
        }
    </script>
</body>
</html>
