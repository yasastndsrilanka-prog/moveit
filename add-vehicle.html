<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-brand">
                <i class="fas fa-truck" style="font-size: 24px; color: #2563eb;"></i>
                <h1>TransPort</h1>
            </div>
            <div class="navbar-menu">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
                <a href="vehicles.html" class="nav-link"><i class="fas fa-truck"></i> Vehicles</a>
                <a href="map.html" class="nav-link"><i class="fas fa-map-marked-alt"></i> Live Map</a>
                <a href="reports.html" class="nav-link"><i class="fas fa-chart-bar"></i> Reports</a>
            </div>
        </nav>

        <a href="vehicles.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Vehicles</a>

        <div class="map-container" style="max-width: 600px; margin: 20px auto;">
            <h2><i class="fas fa-plus-circle"></i> Add New Vehicle</h2>
            <form id="addVehicleForm" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="plateNumber" style="font-weight: 600;"><i class="fas fa-id-card"></i> Plate Number *</label>
                    <input type="text" id="plateNumber" placeholder="e.g., NP-1234" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="ownerName" style="font-weight: 600;"><i class="fas fa-user"></i> Owner Name *</label>
                    <input type="text" id="ownerName" placeholder="Full name" required>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="status" style="font-weight: 600;"><i class="fas fa-info-circle"></i> Status</label>
                    <select id="status">
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                        <option value="maintenance">Maintenance</option>
                    </select>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="currentOdometer" style="font-weight: 600;"><i class="fas fa-odometer"></i> Initial Odometer (km)</label>
                    <input type="number" id="currentOdometer" placeholder="e.g., 12500" min="0" step="0.1">
                </div>
                <button type="submit" style="background: linear-gradient(135deg, #2563eb, #10b981); font-size: 16px; padding: 15px;">
                    <i class="fas fa-save"></i> Save Vehicle
                </button>
            </form>
            <div id="message" style="margin-top: 15px; text-align: center; font-weight: 500;"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const form = document.getElementById('addVehicleForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form values
            const plateNumber = document.getElementById('plateNumber').value.trim();
            const ownerName = document.getElementById('ownerName').value.trim();
            const status = document.getElementById('status').value;
            const currentOdometer = parseFloat(document.getElementById('currentOdometer').value) || 0;

            if (!plateNumber || !ownerName) {
                showMessage('Please fill in all required fields.', 'error');
                return;
            }

            // Disable button to prevent double submission
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

            try {
                const docRef = await addDoc(collection(db, "vehicles"), {
                    plateNumber: plateNumber,
                    ownerName: ownerName,
                    status: status,
                    currentOdometer: currentOdometer,
                    createdAt: new Date() // optional
                });
                showMessage(`Vehicle added successfully! ID: ${docRef.id}`, 'success');
                form.reset(); // clear form
            } catch (error) {
                console.error("Error adding vehicle: ", error);
                showMessage('Error adding vehicle. Check console.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Save Vehicle';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.style.color = type === 'success' ? '#10b981' : '#ef4444';
        }
    </script>
</body>
</html>
