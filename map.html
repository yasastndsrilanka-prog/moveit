<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map | TransPort</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAzmrPdW3tWTYF7pI2XU5XlLR_9RqCJ1cg"></script>
    <!-- Firebase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-truck"></i>
                <h2>TransPort</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="vehicles.html"><i class="fas fa-truck"></i><span>Vehicles</span></a>
                <a href="map.html" class="active"><i class="fas fa-map-marked-alt"></i><span>Live Map</span></a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title"><i class="fas fa-map-marked-alt"></i> Live Vehicle Tracking</h1>
            </div>

            <!-- Controls Panel -->
            <div class="controls-panel">
                <select id="vehicleSelect">
                    <option value="">-- Select Vehicle --</option>
                </select>
                <button id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>

            <!-- Map Container -->
            <div class="map-container">
                <div id="map"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let map;
        let markers = [];
        let polylines = [];

        // Initialize Google Map
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 7.8731, lng: 80.7718 }, // Sri Lanka
                zoom: 8,
                styles: [
                    { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }
                ],
                mapTypeControl: true,
                fullscreenControl: true,
                streetViewControl: false
            });
        }

        // Load vehicles into dropdown
        async function loadVehicles() {
            const select = document.getElementById('vehicleSelect');
            select.innerHTML = '<option value="">-- Select Vehicle --</option>';
            
            try {
                const snapshot = await getDocs(collection(db, "vehicles"));
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = `${data.plateNumber} (${data.ownerName})`;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading vehicles:", error);
            }
        }

        // Clear previous map overlays
        function clearMap() {
            markers.forEach(m => m.setMap(null));
            polylines.forEach(p => p.setMap(null));
            markers = [];
            polylines = [];
        }

        // Fetch and display vehicle path
        async function showVehiclePath(vehicleId) {
            clearMap();

            const locationsRef = collection(db, "locations");
            const q = query(
                locationsRef,
                where("vehicleId", "==", vehicleId),
                orderBy("timestamp", "asc"),
                limit(100)
            );

            try {
                const snapshot = await getDocs(q);
                if (snapshot.empty) {
                    alert("No location data found for this vehicle.");
                    return;
                }

                const path = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    path.push({ lat: data.lat, lng: data.lng });
                });

                // Draw polyline
                const routePolyline = new google.maps.Polyline({
                    path: path,
                    geodesic: true,
                    strokeColor: "#4361ee",
                    strokeOpacity: 1.0,
                    strokeWeight: 4
                });
                routePolyline.setMap(map);
                polylines.push(routePolyline);

                // Add start marker (green)
                const startMarker = new google.maps.Marker({
                    position: path[0],
                    map: map,
                    title: "Start",
                    icon: {
                        url: "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
                        scaledSize: new google.maps.Size(40, 40)
                    }
                });
                markers.push(startMarker);

                // Add end marker (red)
                const endMarker = new google.maps.Marker({
                    position: path[path.length - 1],
                    map: map,
                    title: "Current",
                    icon: {
                        url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png",
                        scaledSize: new google.maps.Size(40, 40)
                    }
                });
                markers.push(endMarker);

                // Adjust map bounds to show entire path
                const bounds = new google.maps.LatLngBounds();
                path.forEach(p => bounds.extend(p));
                map.fitBounds(bounds);

            } catch (error) {
                console.error("Error loading locations:", error);
                alert("Error loading vehicle path.");
            }
        }

        // Event Listeners
        document.getElementById('vehicleSelect').addEventListener('change', (e) => {
            if (e.target.value) {
                showVehiclePath(e.target.value);
            } else {
                clearMap();
                map.setCenter({ lat: 7.8731, lng: 80.7718 });
                map.setZoom(8);
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            const selected = document.getElementById('vehicleSelect').value;
            if (selected) {
                showVehiclePath(selected);
            } else {
                alert("Please select a vehicle first.");
            }
        });

        // Initialize on page load
        window.onload = async () => {
            initMap();
            await loadVehicles();
        };
    </script>
</body>
</html>
