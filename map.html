<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map | TransPort</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Maps API with your key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAzmrPdW3tWTYF7pI2XU5XlLR_9RqCJ1cg"></script>
    <!-- Firebase Import Map -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-truck"></i>
                <h2>TransPort</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="vehicles.html"><i class="fas fa-truck"></i><span>Vehicles</span></a>
                <a href="map.html" class="active"><i class="fas fa-map-marked-alt"></i><span>Live Map</span></a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title"><i class="fas fa-map-marked-alt"></i> Live Vehicle Tracking</h1>
            </div>

            <!-- Controls Panel -->
            <div class="controls-panel">
                <select id="vehicleSelect">
                    <option value="">-- Select Vehicle --</option>
                </select>
                <button id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            </div>

            <!-- Map Container -->
            <div class="map-container">
                <div id="map"></div>
            </div>

            <!-- Status Message (hidden by default) -->
            <div id="statusMessage" style="margin-top: 15px; text-align: center; font-weight: 500; color: white;"></div>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // DOM elements
        const vehicleSelect = document.getElementById('vehicleSelect');
        const refreshBtn = document.getElementById('refreshBtn');
        const statusDiv = document.getElementById('statusMessage');

        let map;
        let markers = [];
        let polylines = [];

        // Helper to show status messages
        function showStatus(msg, isError = false) {
            statusDiv.textContent = msg;
            statusDiv.style.color = isError ? '#f72585' : '#4cc9f0';
            setTimeout(() => {
                statusDiv.textContent = '';
            }, 5000);
        }

        // Initialize Google Map (centered on Sri Lanka)
        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 7.8731, lng: 80.7718 },
                zoom: 8,
                styles: [
                    { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }
                ],
                mapTypeControl: true,
                fullscreenControl: true,
                streetViewControl: false
            });
        }

        // Load vehicles into dropdown
        async function loadVehicles() {
            try {
                const snapshot = await getDocs(collection(db, "vehicles"));
                vehicleSelect.innerHTML = '<option value="">-- Select Vehicle --</option>';
                if (snapshot.empty) {
                    showStatus("No vehicles found. Please add one first.", true);
                }
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const option = document.createElement('option');
                    option.value = doc.id;
                    option.textContent = `${data.plateNumber || 'No Plate'} (${data.ownerName || 'Unknown'})`;
                    vehicleSelect.appendChild(option);
                });
            } catch (error) {
                console.error("Error loading vehicles:", error);
                showStatus("Failed to load vehicles. Check Firestore rules.", true);
            }
        }

        // Clear map overlays
        function clearMap() {
            markers.forEach(m => m.setMap(null));
            polylines.forEach(p => p.setMap(null));
            markers = [];
            polylines = [];
        }

        // Fetch and display vehicle path
        async function showVehiclePath(vehicleId) {
            clearMap();
            showStatus("Loading path...");

            try {
                const locationsRef = collection(db, "locations");
                const q = query(
                    locationsRef,
                    where("vehicleId", "==", vehicleId),
                    orderBy("timestamp", "asc"),
                    limit(100)
                );

                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    showStatus("No location data found for this vehicle.", true);
                    return;
                }

                const path = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.lat && data.lng) {
                        path.push({ lat: data.lat, lng: data.lng });
                    }
                });

                if (path.length === 0) {
                    showStatus("No valid coordinates found.", true);
                    return;
                }

                // Draw polyline
                const routePolyline = new google.maps.Polyline({
                    path: path,
                    geodesic: true,
                    strokeColor: "#4361ee",
                    strokeOpacity: 1.0,
                    strokeWeight: 4
                });
                routePolyline.setMap(map);
                polylines.push(routePolyline);

                // Start marker (green)
                const startMarker = new google.maps.Marker({
                    position: path[0],
                    map: map,
                    title: "Start",
                    icon: {
                        url: "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
                        scaledSize: new google.maps.Size(40, 40)
                    }
                });
                markers.push(startMarker);

                // End marker (red)
                const endMarker = new google.maps.Marker({
                    position: path[path.length - 1],
                    map: map,
                    title: "Current",
                    icon: {
                        url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png",
                        scaledSize: new google.maps.Size(40, 40)
                    }
                });
                markers.push(endMarker);

                // Fit bounds
                const bounds = new google.maps.LatLngBounds();
                path.forEach(p => bounds.extend(p));
                map.fitBounds(bounds);

                showStatus(`Path loaded: ${path.length} points.`);
            } catch (error) {
                console.error("Error loading path:", error);
                if (error.code === 'permission-denied') {
                    showStatus("Permission denied. Check Firestore rules.", true);
                } else if (error.code === 'failed-precondition') {
                    showStatus("Missing index. Check console for link to create one.", true);
                } else {
                    showStatus("Error loading vehicle path. Check console.", true);
                }
            }
        }

        // Event listeners
        vehicleSelect.addEventListener('change', (e) => {
            if (e.target.value) {
                showVehiclePath(e.target.value);
            } else {
                clearMap();
                map.setCenter({ lat: 7.8731, lng: 80.7718 });
                map.setZoom(8);
            }
        });

        refreshBtn.addEventListener('click', () => {
            const selected = vehicleSelect.value;
            if (selected) {
                showVehiclePath(selected);
            } else {
                showStatus("Please select a vehicle first.", true);
            }
        });

        // Initialize everything when page loads
        window.onload = async () => {
            initMap();
            await loadVehicles();
        };
    </script>
</body>
</html>
