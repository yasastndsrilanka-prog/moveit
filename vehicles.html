<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-truck"></i>
                <h2>TransPort</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html"><i class="fas fa-home"></i><span>Dashboard</span></a>
                <a href="vehicles.html" class="active"><i class="fas fa-truck"></i><span>Vehicles</span></a>
                <a href="map.html"><i class="fas fa-map-marked-alt"></i><span>Live Map</span></a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i><span>Reports</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title"><i class="fas fa-truck"></i> Vehicles</h1>
                <a href="add-vehicle.html" class="btn-primary" style="width: auto; padding: 12px 24px;"><i class="fas fa-plus"></i> Add Vehicle</a>
            </div>

            <div id="vehicle-list" class="vehicle-grid">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        async function loadVehicles() {
            const vehicleList = document.getElementById('vehicle-list');
            try {
                const querySnapshot = await getDocs(collection(db, "vehicles"));
                if (querySnapshot.empty) {
                    vehicleList.innerHTML = '<p style="color: white; text-align: center;">No vehicles found.</p>';
                    return;
                }
                let html = '';
                querySnapshot.forEach(doc => {
                    const v = doc.data();
                    const statusClass = v.status === 'active' ? 'status-active' : (v.status === 'inactive' ? 'status-inactive' : 'status-maintenance');
                    html += `
                        <div class="vehicle-card">
                            <h3><i class="fas fa-truck"></i> ${v.plateNumber || 'No Plate'}</h3>
                            <p><i class="fas fa-user"></i> ${v.ownerName || 'Unknown'}</p>
                            <p><i class="fas fa-tachometer-alt"></i> Odometer: ${v.currentOdometer || 0} km</p>
                            <p><i class="fas fa-circle"></i> Status: <span class="status-badge ${statusClass}">${v.status || 'active'}</span></p>
                        </div>
                    `;
                });
                vehicleList.innerHTML = html;
            } catch (error) {
                console.error("Error loading vehicles: ", error);
                vehicleList.innerHTML = '<p style="color: white; text-align: center;">Error loading vehicles.</p>';
            }
        }

        loadVehicles();
    </script>
</body>
</html>
