<!DOCTYPE html>
<html>
<head>
    <title>Simple Map</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAzmrPdW3tWTYF7pI2XU5XlLR_9RqCJ1cg"></script>
    <style>#map { height: 400px; }</style>
</head>
<body>
    <div id="map"></div>
    <script>
        new google.maps.Map(document.getElementById('map'), {
            center: { lat: 7.8731, lng: 80.7718 },
            zoom: 8
        });
    </script>
</body>
</html>
